name: IPTV Health Example

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Write redacted sample playlist
        run: |
          cat > playlist.m3u <<'EOF'
          #EXTM3U
          #EXTINF:-1 tvg-id="example.channel" group-title="Demo",Example Legal Placeholder
          https://example.com/legal-placeholder.m3u8
          EOF
      - run: pnpm --filter iptv-doctor doctor check "$GITHUB_WORKSPACE/playlist.m3u" --report "$GITHUB_WORKSPACE/report.html" --json "$GITHUB_WORKSPACE/report.json" --csv "$GITHUB_WORKSPACE/report.csv" --badge "$GITHUB_WORKSPACE/badge.json"
      - uses: actions/upload-artifact@v4
        with:
          name: iptv-health-report
          path: |
            report.html
            report.json
            report.csv
            badge.json

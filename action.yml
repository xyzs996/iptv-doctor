name: "IPTV Doctor"
description: "Check an IPTV M3U/HLS playlist and upload health report artifacts."

inputs:
  playlist:
    description: "Playlist path relative to the caller workspace."
    required: true
  report:
    description: "HTML report output path."
    required: false
    default: "report.html"
  json:
    description: "JSON report output path."
    required: false
    default: "report.json"
  csv:
    description: "CSV report output path."
    required: false
    default: "report.csv"
  badge:
    description: "Shields endpoint JSON output path."
    required: false
    default: "badge.json"

runs:
  using: "composite"
  steps:
    - uses: pnpm/action-setup@v4
      with:
        version: 11.8.0
    - uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: pnpm
        cache-dependency-path: ${{ github.action_path }}/pnpm-lock.yaml
    - name: Install IPTV Doctor
      shell: bash
      run: pnpm install --frozen-lockfile
      working-directory: ${{ github.action_path }}
    - name: Check playlist
      shell: bash
      run: >
        pnpm --filter iptv-doctor doctor check
        "$GITHUB_WORKSPACE/${{ inputs.playlist }}"
        --report "$GITHUB_WORKSPACE/${{ inputs.report }}"
        --json "$GITHUB_WORKSPACE/${{ inputs.json }}"
        --csv "$GITHUB_WORKSPACE/${{ inputs.csv }}"
        --badge "$GITHUB_WORKSPACE/${{ inputs.badge }}"
      working-directory: ${{ github.action_path }}

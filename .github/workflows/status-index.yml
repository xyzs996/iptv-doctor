name: IPTV Status Index

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm status:index
        env:
          STATUS_INDEX_M3U_URL: ${{ secrets.STATUS_INDEX_M3U_URL }}
          STATUS_INDEX_M3U_TEXT: ${{ secrets.STATUS_INDEX_M3U_TEXT }}
          STATUS_INDEX_LIMIT: "250"
      - name: Commit status index
        run: |
          if [ -z "$(git status --porcelain -- README.md data apps/worldcup-tv-guide/public/status-index.json apps/worldcup-tv-guide/public/status-index.csv apps/worldcup-tv-guide/public/status-badge.json)" ]; then
            echo "No status index changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md data apps/worldcup-tv-guide/public/status-index.json apps/worldcup-tv-guide/public/status-index.csv apps/worldcup-tv-guide/public/status-badge.json
          git commit -m "Update IPTV status index"
          git push
      - run: pnpm --filter iptv-doctor-core build
      - run: pnpm --filter iptv-sports-data build
      - run: pnpm --filter @bjia666/match2epg build
      - run: pnpm --filter worldcup-tv-guide build
      - uses: actions/upload-pages-artifact@v4
        with:
          path: apps/worldcup-tv-guide/dist
      - id: deployment
        uses: actions/deploy-pages@v4

name: Publish

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/iptv-doctor:latest
            ghcr.io/${{ github.repository_owner }}/iptv-doctor:${{ github.ref_name }}

  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      - name: npm publish packages
        run: pnpm -r --filter "@iptv-star/*" --filter "iptv-doctor" publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node --import tsx scripts/generate-release-artifacts.ts dist/release
      - uses: actions/upload-artifact@v4
        with:
          name: iptv-doctor-release-artifacts
          path: dist/release/*
      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: dist/release/*
